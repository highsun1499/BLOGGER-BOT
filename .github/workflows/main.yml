name: Gemini Blogger Bot

on:
  schedule:
#    - cron: '0 9 * * *' # 매일 아침 9시(UTC 기준)에 자동 실행
  workflow_dispatch: # 원할 때 버튼 눌러서 수동 실행 가능

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/checkout@v3
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install google-api-python-client google-auth-oauthlib google-auth-httplib2 google-generativeai

      - name: Run Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLIENT_SECRET_JSON: ${{ secrets.CLIENT_SECRET_JSON }}
          BLOG_ID: ${{ secrets.BLOG_ID }}
        run: python bot.py
